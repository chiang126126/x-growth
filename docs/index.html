<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X-Growth 运营看板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
<div class="max-w-7xl mx-auto p-4 md:p-6 space-y-5">

  <!-- Header -->
  <header class="flex items-center justify-between flex-wrap gap-3">
    <div>
      <h1 class="text-2xl md:text-3xl font-bold tracking-tight">🚀 X-Growth 运营看板</h1>
      <p class="text-sm text-slate-500 mt-1" id="updated-at">载入中…</p>
    </div>
    <a id="edit-link" href="#" target="_blank"
       class="text-sm px-3 py-1.5 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">
      ✏️ 编辑数据
    </a>
  </header>

  <!-- KPI Cards -->
  <section class="grid grid-cols-2 lg:grid-cols-4 gap-3">
    <div class="kpi-card" id="kpi-x"></div>
    <div class="kpi-card" id="kpi-xhs"></div>
    <div class="kpi-card" id="kpi-imp"></div>
    <div class="kpi-card" id="kpi-eng"></div>
  </section>

  <!-- Today + Upcoming -->
  <section class="grid lg:grid-cols-2 gap-4">
    <div class="card">
      <h2 class="card-title">🎯 今日动作</h2>
      <div id="today-actions" class="space-y-2"></div>
    </div>
    <div class="card">
      <h2 class="card-title">📅 未来 7 天</h2>
      <div id="upcoming"></div>
    </div>
  </section>

  <!-- Charts -->
  <section class="grid lg:grid-cols-3 gap-4">
    <div class="card lg:col-span-2">
      <h2 class="card-title">📈 粉丝增长（30天）</h2>
      <div class="chart-wrap"><canvas id="chart-followers"></canvas></div>
    </div>
    <div class="card">
      <h2 class="card-title">🥧 内容柱配比</h2>
      <div class="chart-wrap"><canvas id="chart-pillar"></canvas></div>
    </div>
  </section>

  <section class="grid lg:grid-cols-2 gap-4">
    <div class="card">
      <h2 class="card-title">📊 每日曝光（14天）</h2>
      <div class="chart-wrap"><canvas id="chart-impressions"></canvas></div>
    </div>
    <div class="card">
      <h2 class="card-title">⚡ 互动率走势</h2>
      <div class="chart-wrap"><canvas id="chart-engagement"></canvas></div>
    </div>
  </section>

  <!-- Top / Flop tables -->
  <section class="grid lg:grid-cols-2 gap-4">
    <div class="card">
      <h2 class="card-title">🔥 近期 Top（按互动率）</h2>
      <div id="top-posts" class="text-sm"></div>
    </div>
    <div class="card">
      <h2 class="card-title">💩 近期哑火</h2>
      <div id="flop-posts" class="text-sm"></div>
    </div>
  </section>

  <!-- All posts table -->
  <section class="card">
    <h2 class="card-title">📋 已发布全表</h2>
    <div class="overflow-x-auto">
      <table class="w-full text-sm" id="posts-table"></table>
    </div>
  </section>

  <footer class="text-center text-xs text-slate-400 py-6">
    Built for chiang126126 · 数据源：<code>docs/data.json</code> · 每晚 22:00 更新
  </footer>
</div>
<script src="app.js"></script>
</body>
</html>
